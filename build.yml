name: Compile Minecraft Plugin

on: [push]

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Execute Compiler Build
        run: gradle build

      - name: Create Web Download Link
        uses: actions/upload-artifact@v4
        with:
          name: FasterHoppers-Plugin
          path: build/libs/*.jar
